<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日常趣事 | 时代周刊特辑</title>
    <style>
        /* 时代周刊 全局基础样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Helvetica Neue', Helvetica, 'Microsoft YaHei', sans-serif;
        }

        body {
            background-color: #f8f8f8;
            color: #121212;
            line-height: 1.4;
        }

        /* 头部导航 - TIME极简黑色栏 */
        header {
            background-color: #000000;
            color: #ffffff;
            padding: 1.2rem 5%;
            position: sticky;
            top: 0;
            z-index: 999;
            border-bottom: 3px solid #e4002b; /* TIME经典红 */
        }
        .header-container {
            max-width: 1300px;
            margin: 0 auto;
        }
        .back-btn {
            color: #ffffff;
            text-decoration: none;
            font-size: 1rem;
            font-weight: 500;
            transition: color 0.3s;
        }
        .back-btn:hover {
            color: #e4002b;
        }

        /* 主体内容 */
        main {
            max-width: 1300px;
            margin: 3rem auto;
            padding: 0 5%;
        }
        .page-title {
            text-align: center;
            margin-bottom: 3rem;
        }
        .page-title h1 {
            font-size: 2.8rem;
            font-weight: 900;
            letter-spacing: -1px;
            color: #000;
            margin-bottom: 0.8rem;
            text-transform: uppercase;
        }
        .page-title p {
            color: #666;
            font-size: 1.1rem;
            font-weight: 300;
        }

        /* 时代周刊 卡片布局 */
        .date-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2.5rem;
            max-width: 1100px;
            margin: 0 auto;
        }

        /* 杂志封面式卡片（核心） */
        .date-card {
            position: relative;
            height: 420px;
            border-radius: 4px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            transition: all 0.4s ease;
            cursor: pointer;
        }
        .date-card:hover {
            transform: translateY(-12px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        /* 随机背景图（时代周刊高清配图） */
        .date-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            z-index: 1;
        }
        /* 随机网页图片（自动加载，无版权） */
        .date-card:nth-child(1)::before { background-image: url('https://picsum.photos/800/1200?random=1'); }
        .date-card:nth-child(2)::before { background-image: url('https://picsum.photos/800/1200?random=2'); }
        .date-card:nth-child(3)::before { background-image: url('https://picsum.photos/800/1200?random=3'); }
        .date-card:nth-child(4)::before { background-image: url('https://picsum.photos/800/1200?random=4'); }

        /* 图片渐变遮罩（保证文字清晰） */
        .date-card::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60%;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            z-index: 2;
        }

        /* 卡片文字内容（TIME杂志字体样式） */
        .date-content {
            position: absolute;
            bottom: 0;
            left: 0;
            padding: 2rem;
            z-index: 3;
            color: #fff;
            width: 100%;
        }
        .date-text {
            font-size: 1.8rem;
            font-weight: 900;
            margin-bottom: 0.5rem;
            letter-spacing: 1px;
        }
        .date-desc {
            font-size: 1rem;
            opacity: 0.9;
            margin-bottom: 1.5rem;
            font-weight: 300;
        }
        /* 时代周刊红色按钮 */
        .date-btn {
            display: inline-block;
            padding: 0.9rem 1.8rem;
            background-color: #e4002b;
            color: #ffffff;
            text-align: center;
            text-decoration: none;
            border-radius: 2px;
            font-weight: 700;
            font-size: 0.95rem;
            transition: background-color 0.3s;
            border: none;
        }
        .date-btn:hover {
            background-color: #c00022;
        }

        /* 页脚 */
        footer {
            background-color: #000000;
            color: #ffffff;
            text-align: center;
            padding: 2rem;
            margin-top: 4rem;
            border-top: 3px solid #e4002b;
        }
        .footer-text {
            font-size: 0.9rem;
            opacity: 0.8;
            letter-spacing: 0.5px;
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            .page-title h1 {
                font-size: 2rem;
            }
            .date-card {
                height: 380px;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-container">
            <a href="luory.html" class="back-btn">← 返回首页</a>
        </div>
    </header>

    <main>
        <div class="page-title">
            <h1>LUORY 特辑 · 每日趣事记录</h1>
            <p>SELECT A DATE · VIEW THE STORY</p>
        </div>

        <!-- 时代周刊风格日期卡片 -->
        <div class="date-container">
            <div class="date-card">
                <div class="date-content">
                    <div class="date-text">2026.03.23</div>
                    <p class="date-desc">MONDAY / 周一</p>
                    <a href="daily/daily_20260323.html" class="date-btn">READ MORE</a>
                </div>
            </div>

            <div class="date-card">
                <div class="date-content">
                    <div class="date-text">2026.03.24</div>
                    <p class="date-desc">TUESDAY / 周二</p>
                    <a href="daily/daily_20260324.html" class="date-btn">READ MORE</a>
                </div>
            </div>

            <div class="date-card">
                <div class="date-content">
                    <div class="date-text">2026.03.25</div>
                    <p class="date-desc">WEDNESDAY / 周三</p>
                    <a href="daily/daily_20260325.html" class="date-btn">READ MORE</a>
                </div>
            </div>

            <div class="date-card">
                <div class="date-content">
                    <div class="date-text">2026.04.17</div>
                    <p class="date-desc">FRIDAY / 周五</p>
                    <a href="daily/daily_20260417.html" class="date-btn">READ MORE</a>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-text">
            © 2026 LUORY STYLE | 从从帮备案号 | 法人: @Teacher Jia | 审批: @Minister Wan | 从从军委直属: @Commander Yu
        </div>
    </footer>
</body>
</html>
