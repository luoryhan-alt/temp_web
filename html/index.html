<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 适配移动端，保证手机上显示正常 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>活动列表</title>
    <style>
        /* 基础样式重置，避免不同浏览器样式差异 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "微软雅黑", sans-serif;
        }

        /* 页面容器，居中显示+限制宽度，更美观 */
        .container {
            max-width: 800px;
            margin: 50px auto;
            padding: 0 20px;
        }

        /* 活动标题 */
        .page-title {
            font-size: 24px;
            color: #333;
            margin-bottom: 30px;
            text-align: center;
        }

        /* 活动链接列表 */
        .activity-list {
            list-style: none;
        }

        /* 每个活动链接项 */
        .activity-item {
            margin-bottom: 15px;
        }

        /* 超链接样式（重点） */
        .activity-link {
            display: block; /* 块级显示，点击区域更大 */
            padding: 18px 20px;
            background-color: #f5f5f5;
            color: #2d8cf0; /* 蓝色链接色，符合用户习惯 */
            text-decoration: none; /* 去掉默认下划线 */
            border-radius: 8px; /* 圆角，更美观 */
            font-size: 18px;
            transition: background-color 0.3s; /*  hover过渡效果 */
        }

        /* 鼠标悬停时的样式 */
        .activity-link:hover {
            background-color: #e8f4ff;
            color: #1d73d8;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 页面标题 -->
        <h1 class="page-title">活动列表</h1>
        
        <!-- 活动超链接列表 -->
        <ul class="activity-list">
            <li class="activity-item">
                <a href="luory.html" class="activity-link">罗一航的活动</a>
            </li>
            <li class="activity-item">
                <a href="t2-activity.html" class="activity-link">...的活动(自行添加)</a>
            </li>
        </ul>
    </div>
</body>
</html>
